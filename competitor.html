<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>競合分析ツール</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&family=Syne:wght@400;600;700;800&display=swap');

  :root {
    --bg:#0f0f11; --bg2:#161619; --bg3:#1e1e22; --bg4:#242428;
    --border:#2a2a30; --border2:#3a3a42;
    --text:#e8e6e0; --text2:#9a9890; --text3:#5a5856;
    --accent:#c8a96e; --accent2:#e8c98e;
    --accent-dim:rgba(200,169,110,0.12); --accent-dim2:rgba(200,169,110,0.06);
    --red:#c86e6e; --red-dim:rgba(200,110,110,0.12);
    --green:#7ec8a0; --green-dim:rgba(126,200,160,0.10);
    --radius:10px; --radius-sm:6px;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{font-family:'Noto Sans JP',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:14px;line-height:1.6;}

  header{border-bottom:1px solid var(--border);padding:0 28px;display:flex;align-items:center;justify-content:space-between;height:60px;position:sticky;top:0;background:var(--bg);z-index:100;}
  .logo{font-family:'Syne',sans-serif;font-size:17px;font-weight:700;color:var(--accent);}
  .logo span{color:var(--text2);font-weight:400;font-size:13px;margin-left:8px;}

  .btn{font-family:'Noto Sans JP',sans-serif;font-size:13px;font-weight:500;border-radius:var(--radius-sm);cursor:pointer;border:none;transition:all 0.2s;display:inline-flex;align-items:center;gap:6px;padding:7px 14px;}
  .btn-primary{background:var(--accent);color:#0f0f11;}
  .btn-primary:hover{background:var(--accent2);transform:translateY(-1px);}
  .btn-primary:disabled{opacity:0.5;cursor:not-allowed;transform:none;}
  .btn-ghost{background:transparent;color:var(--text2);border:1px solid var(--border2);}
  .btn-ghost:hover{background:var(--bg3);color:var(--text);}
  .btn-ghost.active{background:var(--accent-dim);color:var(--accent);border-color:var(--accent);}
  .btn-sm{padding:5px 11px;font-size:12px;}
  .btn-danger{background:transparent;color:var(--red);border:1px solid var(--red);}
  .btn-danger:hover{background:var(--red-dim);}

  .main-wrap{max-width:1200px;margin:0 auto;padding:24px 24px 80px;}

  /* ── フィルターバー ── */
  .filter-block{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:18px 20px;margin-bottom:20px;}
  .filter-row{display:flex;align-items:center;gap:12px;flex-wrap:wrap;margin-bottom:10px;}
  .filter-row:last-child{margin-bottom:0;}
  .filter-label{font-size:12px;color:var(--text3);min-width:72px;letter-spacing:0.04em;}

  .season-tabs{display:flex;gap:4px;}
  .season-tab{font-size:12px;font-weight:500;padding:5px 14px;border-radius:20px;cursor:pointer;border:1px solid var(--border2);background:transparent;color:var(--text2);transition:all 0.15s;}
  .season-tab:hover{border-color:var(--accent);color:var(--text);}
  .season-tab.active{background:var(--accent-dim);color:var(--accent);border-color:var(--accent);}

  .cat-tabs{display:flex;gap:4px;flex-wrap:wrap;}
  .cat-tab{font-size:12px;font-weight:500;padding:5px 14px;border-radius:20px;cursor:pointer;border:1px solid var(--border2);background:transparent;color:var(--text2);transition:all 0.15s;}
  .cat-tab:hover{border-color:var(--accent);color:var(--text);}
  .cat-tab.active{background:var(--accent-dim);color:var(--accent);border-color:var(--accent);}

  .date-inputs{display:flex;align-items:center;gap:8px;}
  .date-input{background:var(--bg3);border:1px solid var(--border2);border-radius:var(--radius-sm);color:var(--text);font-family:'Noto Sans JP',sans-serif;font-size:12px;padding:5px 10px;outline:none;transition:border-color 0.2s;}
  .date-input:focus{border-color:var(--accent);}
  .date-sep{color:var(--text3);font-size:12px;}

  /* ── ブランド選択 ── */
  .section-title{font-family:'Syne',sans-serif;font-size:12px;font-weight:600;letter-spacing:0.08em;color:var(--text3);text-transform:uppercase;margin-bottom:10px;}
  .brand-grid{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:16px;}
  .brand-chip{display:flex;align-items:center;gap:8px;padding:7px 16px;border:1px solid var(--border2);border-radius:30px;cursor:pointer;transition:all 0.2s;font-size:13px;color:var(--text2);background:var(--bg2);user-select:none;}
  .brand-chip:hover{border-color:var(--accent);color:var(--text);}
  .brand-chip.selected{border-color:var(--accent);color:var(--accent);background:var(--accent-dim);}
  .brand-chip .check{width:15px;height:15px;border-radius:50%;border:1.5px solid currentColor;display:flex;align-items:center;justify-content:center;font-size:9px;flex-shrink:0;}
  .brand-chip.selected .check{background:var(--accent);border-color:var(--accent);color:#0f0f11;}

  .action-bar{display:flex;align-items:center;gap:10px;margin-bottom:20px;flex-wrap:wrap;}

  /* ── ツールバー ── */
  .tools-bar{display:flex;align-items:center;gap:10px;margin-bottom:20px;padding:12px 16px;background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);flex-wrap:wrap;}
  .tools-label{font-size:12px;color:var(--text3);}

  /* ── ローディング ── */
  .loading-bar{display:none;height:2px;background:linear-gradient(90deg,var(--accent),#6e8fc8,var(--accent));background-size:200% 100%;animation:loadAnim 1.2s linear infinite;position:fixed;top:0;left:0;right:0;z-index:999;}
  .loading-bar.active{display:block;}
  @keyframes loadAnim{0%{background-position:0%}100%{background-position:200%}}

  /* ── ブランドセクション ── */
  .brands-container{display:flex;flex-direction:column;gap:28px;}
  .brand-section{background:var(--bg2);border:1px solid var(--border);border-radius:14px;overflow:hidden;}
  .brand-header{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;}
  .brand-name{font-family:'Syne',sans-serif;font-size:17px;font-weight:700;color:var(--accent);}
  .brand-meta{display:flex;align-items:center;gap:8px;}
  .cache-badge{font-size:11px;color:var(--text3);background:var(--bg3);border:1px solid var(--border);border-radius:4px;padding:2px 8px;}
  .cache-badge.fresh{color:var(--green);border-color:rgba(126,200,160,0.3);background:var(--green-dim);}
  .brand-body{padding:20px;}
  .brand-cols{display:grid;grid-template-columns:1fr 1fr;gap:20px;}
  @media(max-width:700px){.brand-cols{grid-template-columns:1fr;}}

  .col-title{font-family:'Syne',sans-serif;font-size:11px;font-weight:600;letter-spacing:0.08em;color:var(--text3);text-transform:uppercase;margin-bottom:12px;display:flex;align-items:center;gap:6px;}
  .col-title::before{content:'';display:block;width:3px;height:13px;background:var(--accent);border-radius:2px;}

  /* ── LP カード ── */
  .lp-cards{display:flex;flex-direction:column;gap:10px;}
  .lp-card{background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;transition:border-color 0.2s;}
  .lp-card:hover{border-color:var(--border2);}
  .lp-thumb{width:100%;height:150px;object-fit:cover;display:block;background:var(--bg4);}
  .lp-thumb-placeholder{width:100%;height:150px;background:var(--bg4);display:flex;align-items:center;justify-content:center;color:var(--text3);font-size:32px;}
  .lp-info{padding:11px 13px;}
  .lp-tag{font-size:10px;font-weight:600;letter-spacing:0.06em;color:var(--accent);text-transform:uppercase;margin-bottom:3px;}
  .lp-title{font-size:13px;font-weight:500;color:var(--text);line-height:1.5;margin-bottom:3px;}
  .lp-desc{font-size:12px;color:var(--text2);line-height:1.6;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
  .lp-link{display:inline-flex;align-items:center;gap:4px;font-size:11px;color:var(--accent);text-decoration:none;margin-top:7px;}
  .lp-link:hover{text-decoration:underline;}

  /* ── EC アイテム ── */
  .ec-items{display:flex;flex-direction:column;gap:8px;}
  .ec-item{background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius);display:flex;gap:12px;align-items:flex-start;padding:11px;transition:border-color 0.2s;}
  .ec-item:hover{border-color:var(--border2);}
  .ec-rank{font-family:'Syne',sans-serif;font-size:17px;font-weight:700;color:var(--border2);min-width:26px;line-height:1;}
  .ec-rank.top3{color:var(--accent);}
  .ec-thumb{width:60px;height:60px;object-fit:cover;border-radius:6px;flex-shrink:0;background:var(--bg4);}
  .ec-thumb-placeholder{width:60px;height:60px;border-radius:6px;flex-shrink:0;background:var(--bg4);display:flex;align-items:center;justify-content:center;color:var(--text3);font-size:22px;}
  .ec-info{flex:1;min-width:0;}
  .ec-cat{font-size:10px;color:var(--text3);margin-bottom:2px;letter-spacing:0.04em;}
  .ec-name{font-size:13px;font-weight:500;color:var(--text);line-height:1.4;margin-bottom:2px;}
  .ec-price{font-size:12px;color:var(--accent);font-weight:500;}
  .ec-link{font-size:11px;color:var(--text3);text-decoration:none;}
  .ec-link:hover{color:var(--accent);}

  .brand-loading{padding:40px;text-align:center;color:var(--text3);}
  .spinner{display:inline-block;width:22px;height:22px;border:2px solid var(--border2);border-top-color:var(--accent);border-radius:50%;animation:spin 0.8s linear infinite;margin-bottom:10px;}
  @keyframes spin{to{transform:rotate(360deg)}}
  .empty-col{padding:20px;text-align:center;color:var(--text3);font-size:13px;background:var(--bg3);border-radius:var(--radius);}
  .no-data{text-align:center;padding:60px 20px;color:var(--text3);}
  .no-data-icon{font-size:36px;margin-bottom:12px;opacity:0.4;}
  .no-data-text{font-family:'Syne',sans-serif;font-size:15px;font-weight:600;margin-bottom:6px;}
  .no-data-sub{font-size:13px;}

  /* ── モーダル ── */
  .modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.8);z-index:200;align-items:flex-start;justify-content:center;padding:40px 20px;overflow-y:auto;}
  .modal-overlay.open{display:flex;}
  .modal{background:var(--bg2);border:1px solid var(--border2);border-radius:14px;width:100%;max-width:780px;padding:32px;position:relative;margin:auto;}
  .modal-close{position:absolute;top:16px;right:16px;width:28px;height:28px;border:1px solid var(--border2);border-radius:6px;background:transparent;color:var(--text2);cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;}
  .modal-close:hover{background:var(--bg3);}
  .report-title{font-family:'Syne',sans-serif;font-size:22px;font-weight:700;color:var(--accent);margin-bottom:4px;}
  .report-sub{font-size:13px;color:var(--text3);margin-bottom:24px;}
  .report-section{margin-bottom:24px;}
  .report-section-title{font-family:'Syne',sans-serif;font-size:14px;font-weight:600;color:var(--text);border-bottom:1px solid var(--border);padding-bottom:8px;margin-bottom:14px;}
  .report-brand-block{background:var(--bg3);border-radius:var(--radius);padding:14px;margin-bottom:10px;}
  .report-brand-name{font-family:'Syne',sans-serif;font-size:14px;font-weight:700;color:var(--accent);margin-bottom:8px;}
  .report-row{display:flex;gap:8px;margin-bottom:4px;font-size:13px;}
  .report-label{color:var(--text3);min-width:90px;flex-shrink:0;}
  .report-value{color:var(--text2);}
  .report-images{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px;}
  .report-img{width:80px;height:60px;object-fit:cover;border-radius:6px;background:var(--bg4);}

  /* ── 設定 ── */
  .settings-panel{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.72);z-index:200;align-items:center;justify-content:center;padding:20px;}
  .settings-panel.open{display:flex;}
  .settings-box{background:var(--bg2);border:1px solid var(--border2);border-radius:14px;width:100%;max-width:480px;padding:28px;position:relative;}
  .settings-title{font-family:'Syne',sans-serif;font-size:17px;font-weight:700;margin-bottom:20px;color:var(--accent);}
  .form-group{margin-bottom:18px;}
  .form-label{font-size:12px;color:var(--text3);margin-bottom:6px;display:block;letter-spacing:0.04em;text-transform:uppercase;}
  .form-input{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text);font-family:'Noto Sans JP',sans-serif;font-size:13px;padding:9px 12px;outline:none;transition:border-color 0.2s;}
  .form-input:focus{border-color:var(--accent);}
  .form-hint{font-size:11px;color:var(--text3);margin-top:4px;}

  .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--bg3);border:1px solid var(--border2);border-radius:var(--radius);padding:10px 18px;font-size:13px;color:var(--text);z-index:999;opacity:0;transition:opacity 0.3s;pointer-events:none;white-space:nowrap;}
  .toast.show{opacity:1;}

  @media(max-width:640px){header{padding:0 16px;}.main-wrap{padding:16px 12px 60px;}}

  @media print {
    /* ダッシュボード部分を全て非表示 */
    body > *:not(#printArea) { display: none !important; }
    #printArea { display: block !important; }
    .modal-overlay, .settings-panel { display: none !important; }
    body { background: white !important; }

    @page {
      margin: 15mm 12mm;
      size: A4;
    }

    #printArea {
      font-family: 'Noto Sans JP', sans-serif;
      color: #1a1a1a;
      background: white;
    }

    .print-cover {
      text-align: center;
      padding: 60px 0 40px;
      border-bottom: 3px solid #c8a96e;
      margin-bottom: 40px;
    }
    .print-cover-title {
      font-size: 28px;
      font-weight: 700;
      color: #1a1a1a;
      letter-spacing: 0.08em;
      margin-bottom: 8px;
    }
    .print-cover-sub {
      font-size: 13px;
      color: #666;
      margin-bottom: 4px;
    }
    .print-cover-accent {
      display: inline-block;
      margin-top: 12px;
      padding: 4px 16px;
      background: #c8a96e;
      color: white;
      font-size: 12px;
      border-radius: 20px;
    }

    .print-ai-section {
      background: #faf8f4;
      border-left: 4px solid #c8a96e;
      border-radius: 0 8px 8px 0;
      padding: 20px 24px;
      margin-bottom: 32px;
      page-break-inside: avoid;
    }
    .print-ai-label {
      font-size: 11px;
      font-weight: 700;
      color: #c8a96e;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-bottom: 10px;
    }
    .print-ai-text {
      font-size: 13px;
      color: #333;
      line-height: 1.9;
    }

    .print-brand-section {
      page-break-before: always;
      padding-top: 8px;
    }
    .print-brand-section:first-of-type {
      page-break-before: avoid;
    }
    .print-brand-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 2px solid #c8a96e;
      padding-bottom: 10px;
      margin-bottom: 20px;
    }
    .print-brand-name {
      font-size: 22px;
      font-weight: 700;
      color: #1a1a1a;
    }
    .print-brand-date {
      font-size: 11px;
      color: #888;
      background: #f5f5f5;
      padding: 3px 10px;
      border-radius: 4px;
    }

    /* 変遷グリッド */
    .print-timeline {
      display: grid;
      gap: 16px;
      margin-bottom: 20px;
    }
    .print-timeline-2 { grid-template-columns: 1fr 1fr; }
    .print-timeline-3 { grid-template-columns: 1fr 1fr 1fr; }
    .print-timeline-1 { grid-template-columns: 1fr 1fr; }

    .print-date-card {
      border: 1px solid #e0e0e0;
      border-radius: 8px;
      overflow: hidden;
      page-break-inside: avoid;
    }
    .print-date-card-header {
      background: #f5f0e8;
      padding: 8px 14px;
      font-size: 11px;
      font-weight: 700;
      color: #8a6a30;
      border-bottom: 1px solid #e0d0b0;
    }
    .print-date-card-body {
      padding: 12px 14px;
    }

    .print-col-label {
      font-size: 10px;
      font-weight: 700;
      color: #c8a96e;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 8px;
      padding-bottom: 4px;
      border-bottom: 1px solid #e8e0d0;
    }

    .print-lp-item {
      margin-bottom: 8px;
      padding-bottom: 8px;
      border-bottom: 1px solid #f0f0f0;
    }
    .print-lp-item:last-child { border-bottom: none; }
    .print-lp-tag {
      font-size: 9px;
      font-weight: 700;
      color: #c8a96e;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }
    .print-lp-title {
      font-size: 12px;
      font-weight: 600;
      color: #1a1a1a;
      margin: 2px 0;
      line-height: 1.4;
    }
    .print-lp-desc {
      font-size: 10px;
      color: #666;
      line-height: 1.5;
    }

    .print-ec-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 11px;
    }
    .print-ec-table th {
      background: #f5f5f5;
      padding: 5px 8px;
      text-align: left;
      font-size: 9px;
      color: #888;
      font-weight: 600;
      letter-spacing: 0.04em;
    }
    .print-ec-table td {
      padding: 5px 8px;
      border-bottom: 1px solid #f0f0f0;
      vertical-align: top;
    }
    .print-ec-rank {
      font-weight: 700;
      color: #c8a96e;
      font-size: 13px;
    }
    .print-ec-name {
      font-weight: 500;
      color: #1a1a1a;
      line-height: 1.4;
    }
    .print-ec-price {
      color: #c8a96e;
      font-weight: 600;
      white-space: nowrap;
    }
    .print-ec-cat {
      color: #999;
      font-size: 9px;
    }

    * { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
  }
</style>
</head>
<body>

<div class="loading-bar" id="loadingBar"></div>

<header>
  <div class="logo">COMPETITOR WATCH <span>競合分析ツール</span></div>
  <div style="display:flex;align-items:center;gap:10px;">
    <button class="btn btn-ghost btn-sm" onclick="toggleDemoMode()" id="demoBtn">👁 デモ表示</button>
    <button class="btn btn-ghost" id="settingsBtn">⚙ 設定</button>
  </div>
</header>

<div class="main-wrap">

  <!-- フィルターブロック -->
  <div class="filter-block">
    <div class="filter-row">
      <span class="filter-label">シーズン</span>
      <div class="season-tabs" id="seasonTabs"></div>
    </div>
    <div class="filter-row">
      <span class="filter-label">カテゴリ</span>
      <div class="cat-tabs" id="catTabs"></div>
    </div>
    <div class="filter-row">
      <span class="filter-label">取得日</span>
      <div class="date-inputs">
        <input type="date" class="date-input" id="dateFrom" onchange="applyFilters()">
        <span class="date-sep">〜</span>
        <input type="date" class="date-input" id="dateTo" onchange="applyFilters()">
        <button class="btn btn-ghost btn-sm" onclick="clearDateFilter()">クリア</button>
      </div>
    </div>
  </div>

  <!-- ブランド選択 -->
  <div class="section-title">分析するブランドを選択</div>
  <div class="brand-grid" id="brandGrid"></div>
  <div class="action-bar">
    <button class="btn btn-primary" id="fetchBtn" onclick="fetchSelected()">▶ 選択ブランドを取得</button>
    <button class="btn btn-ghost btn-sm" onclick="selectAll()">全選択</button>
    <button class="btn btn-ghost btn-sm" onclick="selectNone()">全解除</button>
  </div>

  <!-- ツールバー -->
  <div class="tools-bar" id="toolsBar" style="display:none">
    <span class="tools-label">操作：</span>
    <button class="btn btn-ghost btn-sm" onclick="exportCSV()">↓ CSVエクスポート</button>
    <button class="btn btn-ghost btn-sm" onclick="generateReport()">📊 シーズンレポート</button>
    <button class="btn btn-danger btn-sm" onclick="clearAllData()">✕ 全データ削除</button>
  </div>

  <!-- 表示エリア -->
  <div class="brands-container" id="brandsContainer"></div>

</div>

<!-- レポートモーダル -->
<div class="modal-overlay" id="reportModal" onclick="closeModal('reportModal',event)">
  <div class="modal" style="max-width:900px;">
    <button class="modal-close" onclick="closeModal('reportModal')">✕</button>
    <div class="report-title" id="reportTitle"></div>
    <div class="report-sub" id="reportSub"></div>
    <div id="reportContent"></div>
    <div style="margin-top:24px;display:flex;gap:10px;flex-wrap:wrap;">
      <button class="btn btn-primary" onclick="printReport()">🖨 PDF保存（印刷）</button>
      <button class="btn btn-ghost btn-sm" onclick="closeModal('reportModal')">閉じる</button>
    </div>
  </div>

// 状態
// ======================================================
let db = null;
let allRecords = [];

let currentCat = 'ALL';

// ======================================================
// IndexedDB
// ======================================================
function openDB() {
  return new Promise((resolve, reject) => {
    const req = indexedDB.open(DB_NAME, DB_VERSION);
    req.onupgradeneeded = e => {
      const d = e.target.result;
      if (!d.objectStoreNames.contains(STORE_NAME)) {
        const store = d.createObjectStore(STORE_NAME, { keyPath: 'key' });
        store.createIndex('brandId', 'brandId', { unique: false });
        store.createIndex('fetchedAt', 'fetchedAt', { unique: false });
      }
    };
    req.onsuccess = e => resolve(e.target.result);
    req.onerror = () => reject(req.error);
  });
}

async function saveRecord(brandId, fetchedAt, lp, ec) {
  const key = `${brandId}_${fetchedAt}`;
  const tx = db.transaction(STORE_NAME, 'readwrite');
  tx.objectStore(STORE_NAME).put({ key, brandId, fetchedAt, lp, ec });
  return new Promise((res, rej) => { tx.oncomplete = res; tx.onerror = rej; });
}

async function loadAllRecords() {
  return new Promise((resolve, reject) => {
    const tx = db.transaction(STORE_NAME, 'readonly');
    const req = tx.objectStore(STORE_NAME).getAll();
    req.onsuccess = () => resolve(req.result);
    req.onerror = () => reject(req.error);
  });
}

async function deleteRecord(key) {
  const tx = db.transaction(STORE_NAME, 'readwrite');
  tx.objectStore(STORE_NAME).delete(key);
  return new Promise((res, rej) => { tx.oncomplete = res; tx.onerror = rej; });
}

async function clearDB() {
  const tx = db.transaction(STORE_NAME, 'readwrite');
  tx.objectStore(STORE_NAME).clear();
  return new Promise((res, rej) => { tx.oncomplete = res; tx.onerror = rej; });
}

// ======================================================
// シーズン判定
// ======================================================
function getSeason(dateStr) {
  const d = new Date(dateStr);
  const m = d.getMonth() + 1;
  const y = d.getFullYear();
  if (m >= 3 && m <= 8) return `${y}春夏`;
  if (m >= 9) return `${y}秋冬`;
  return `${y-1}秋冬`;
}

function getSeasonOptions() {
  const seasons = new Set(['ALL']);
  allRecords.forEach(r => seasons.add(getSeason(r.fetchedAt)));
  return ['ALL', ...Array.from(seasons).filter(s => s !== 'ALL').sort().reverse()];
}

// ======================================================
// フィルタリング（ダッシュボード表示用：最新1件）
// ======================================================
function getFilteredRecords() {
  const records = demoMode
    ? Object.entries(DEMO_DATA).map(([brandId, d]) => ({ key: brandId, brandId, ...d }))
    : allRecords;

  const from = document.getElementById('dateFrom').value;
  const to   = document.getElementById('dateTo').value;

  // ブランドごとに最新レコードをまとめる
  const byBrand = {};
  records.forEach(r => {
    if (!byBrand[r.brandId] || r.fetchedAt > byBrand[r.brandId].fetchedAt) {
      byBrand[r.brandId] = r;
    }
  });

  return BRANDS
    .filter(b => {
      const r = byBrand[b.id];
      if (!r) return false;
      if (currentSeason !== 'ALL' && getSeason(r.fetchedAt) !== currentSeason) return false;
      if (from && r.fetchedAt < from) return false;
      if (to && r.fetchedAt.slice(0,10) > to) return false;
      return true;
    })
    .map(b => ({ brand: b, record: byBrand[b.id] }));
}

// レポート用：期間内の全レコードをブランド別に返す
function getAllRecordsForReport() {
  const records = demoMode
    ? Object.entries(DEMO_DATA).map(([brandId, d]) => ({ key: brandId, brandId, ...d }))
    : allRecords;

  const from = document.getElementById('dateFrom').value;
  const to   = document.getElementById('dateTo').value;

  // 期間フィルター
  const filtered = records.filter(r => {
    if (currentSeason !== 'ALL' && getSeason(r.fetchedAt) !== currentSeason) return false;
    if (from && r.fetchedAt.slice(0,10) < from) return false;
    if (to && r.fetchedAt.slice(0,10) > to) return false;
    return true;
  });

  // ブランドごとに時系列でまとめる
  const byBrand = {};
  BRANDS.forEach(b => { byBrand[b.id] = []; });
  filtered.forEach(r => {
    if (byBrand[r.brandId]) byBrand[r.brandId].push(r);
  });
  Object.keys(byBrand).forEach(id => {
    byBrand[id].sort((a, b) => a.fetchedAt.localeCompare(b.fetchedAt));
  });

  return BRANDS
    .filter(b => byBrand[b.id]?.length > 0)
    .map(b => ({ brand: b, records: byBrand[b.id] }));
}

function filterEC(ecList) {
  if (currentCat === 'ALL') return ecList;
  return ecList.filter(item => (item.category || '').includes(currentCat));
}

// ブランド選択
// ======================================================
function toggleBrand(id) { selectedBrands.has(id) ? selectedBrands.delete(id) : selectedBrands.add(id); renderBrandGrid(); }
function selectAll()  { BRANDS.forEach(b => selectedBrands.add(b.id)); renderBrandGrid(); }
function selectNone() { selectedBrands.clear(); renderBrandGrid(); }

// ======================================================
// データ取得
// ======================================================
async function fetchSelected() {
  if (selectedBrands.size === 0) { showToast('ブランドを選択してください'); return; }
  const workerUrl = getWorkerUrl();
  if (!workerUrl) { document.getElementById('settingsPanel').classList.add('open'); showToast('Worker URLを設定してください'); return; }

  const btn = document.getElementById('fetchBtn');
  const bar = document.getElementById('loadingBar');
  btn.disabled = true;
  bar.classList.add('active');

  const targets = BRANDS.filter(b => selectedBrands.has(b.id));

  for (const brand of targets) {
    btn.textContent = `取得中... ${brand.name}`;
    try {
      const prompt = `「${brand.name}」(${brand.url})の現在の販促LP・新作特集・EC人気商品を調査し、以下のJSON形式のみで返答してください。JSONの前後に説明文を書かないでください。
{"lp":[{"tag":"タグ","title":"タイトル","desc":"説明80字以内","url":"URL","imageUrl":"画像URLか空文字"}],"ec":[{"rank":1,"category":"スーツ","name":"商品名","price":"¥XX,XXX","url":"URL","imageUrl":"画像URLか空文字"}]}
lp最大3件、ec最大5件。JSONのみ出力。`;

      const res = await fetch(workerUrl, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          model: 'claude-haiku-4-5-20251001',
          max_tokens: 1000,
          tools: [{ type: 'web_search_20250305', name: 'web_search' }],
          messages: [{ role: 'user', content: prompt }]
        })
      });

      const result = await res.json();
      const text = (result.content || []).filter(b => b.type === 'text' && b.text).map(b => b.text).join('');
      const match = text.replace(/```json|```/g,'').trim().match(/\{[\s\S]*\}/);

      if (match) {
        const parsed = JSON.parse(match[0]);
        const fetchedAt = new Date().toISOString();
        await saveRecord(brand.id, fetchedAt, parsed.lp || [], parsed.ec || []);
      }
    } catch(e) { console.error(brand.name, e); showToast(`${brand.name}の取得に失敗しました`); }
  }

  allRecords = await loadAllRecords();
  btn.disabled = false;
  btn.textContent = '▶ 選択ブランドを取得';
  bar.classList.remove('active');
  renderSeasonTabs();
  renderBrandsContainer();
  updateToolsBar();
  showToast('取得完了しました');
}

async function refetchBrand(brandId) {
  selectedBrands = new Set([brandId]);
  renderBrandGrid();
  await fetchSelected();
  selectedBrands = new Set(BRANDS.map(b => b.id));
  renderBrandGrid();
}

async function deleteBrandData(brandId) {
  const targets = allRecords.filter(r => r.brandId === brandId);
  for (const r of targets) await deleteRecord(r.key);
  allRecords = await loadAllRecords();
  renderSeasonTabs();
  renderBrandsContainer();
  updateToolsBar();
  showToast('削除しました');
}

async function clearAllData() {
  if (!confirm('全ブランドのデータを削除しますか？')) return;
  await clearDB();
  allRecords = [];
  renderSeasonTabs();
  renderBrandsContainer();
  updateToolsBar();
  showToast('全データを削除しました');
}

// ======================================================
// CSVエクスポート
// ======================================================
function exportCSV() {
  const now = new Date();
  const rows = [['シーズン','ブランド','種別','カテゴリ/タグ','商品名/タイトル','説明','価格','URL','取得日']];
  getFilteredRecords().forEach(({ brand, record }) => {
    const season = getSeason(record.fetchedAt);
    const date = new Date(record.fetchedAt).toLocaleDateString('ja-JP');
    (record.lp||[]).forEach(i => rows.push([season, brand.name, 'LP/特集', i.tag||'', i.title||'', i.desc||'', '', i.url||'', date]));
    filterEC(record.ec||[]).forEach(i => rows.push([season, brand.name, 'EC売れ筋', i.category||'', i.name||'', '', i.price||'', i.url||'', date]));
  });
  const csv = rows.map(r => r.map(v => `"${String(v).replace(/"/g,'""')}"`).join(',')).join('\n');
  const blob = new Blob(['\uFEFF' + csv], { type: 'text/csv;charset=utf-8' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `competitor_${now.getFullYear()}${String(now.getMonth()+1).padStart(2,'0')}${String(now.getDate()).padStart(2,'0')}.csv`;
  a.click();
  showToast('CSVをエクスポートしました');
}

// ======================================================
// レポート生成（変遷・AI総括対応版）
// ======================================================
async function generateReport() {
  const byBrand = getAllRecordsForReport();
  if (byBrand.length === 0) { showToast('表示中のデータがありません'); return; }

  const workerUrl = getWorkerUrl();
  const now = new Date();
  const seasonLabel = currentSeason === 'ALL' ? '全期間' : currentSeason;
  const from = document.getElementById('dateFrom').value;
  const to   = document.getElementById('dateTo').value;
  const periodLabel = from || to ? `${from||''}〜${to||''}` : seasonLabel;

  document.getElementById('reportTitle').textContent = '競合分析レポート';
  document.getElementById('reportSub').textContent = `期間：${periodLabel}　作成日：${now.toLocaleDateString('ja-JP')}`;
  document.getElementById('reportContent').innerHTML = '<div style="text-align:center;padding:40px;color:var(--text3)"><div class="spinner" style="margin:0 auto 12px"></div>AI総括コメントを生成中...</div>';
  document.getElementById('reportModal').classList.add('open');

  // ブランドごとの変遷データをテキスト化（AI用）
  let summaryForAI = '';
  byBrand.forEach(({ brand, records }) => {
    summaryForAI += `\n【${brand.name}】\n`;
    records.forEach(r => {
      const date = new Date(r.fetchedAt).toLocaleDateString('ja-JP');
      summaryForAI += `▼${date}\n`;
      (r.lp||[]).forEach(i => { summaryForAI += `  LP: ${i.tag||''} / ${i.title||''}\n`; });
      (r.ec||[]).forEach(i => { summaryForAI += `  EC${i.rank}位: ${i.name||''} ${i.price||''}\n`; });
    });
  });

  // AI総括コメント生成
  let aiComment = '';
  if (workerUrl && summaryForAI) {
    try {
      const prompt = `以下はスーツ業界競合ブランドの販促LP・EC売れ筋データの変遷です。ONLYというスーツブランドのEC・販促担当者の視点で、各ブランドの戦略の変化・トレンド・競合動向について総括コメントを日本語400字以内で作成してください。

${summaryForAI}

総括コメントのみ返してください。前置き不要。`;

      const res = await fetch(workerUrl, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          model: 'claude-haiku-4-5-20251001',
          max_tokens: 600,
          messages: [{ role: 'user', content: prompt }]
        })
      });
      const data = await res.json();
      aiComment = (data.content||[]).filter(b=>b.type==='text'&&b.text).map(b=>b.text).join('');
    } catch(e) {
      aiComment = '（AI総括の生成に失敗しました）';
    }
  }

  // レポートHTML生成
  let html = '';

  // AI総括
  if (aiComment) {
    html += `<div class="report-section">
      <div class="report-section-title">🤖 AI総括コメント</div>
      <div style="background:var(--accent-dim);border-left:3px solid var(--accent);border-radius:0 var(--radius) var(--radius) 0;padding:14px 16px;font-size:13px;color:var(--text);line-height:1.8;">${h(aiComment)}</div>
    </div>`;
  }

  // ブランドごとの変遷
  byBrand.forEach(({ brand, records }) => {
    html += `<div class="report-section">
      <div class="report-section-title">📊 ${brand.name} の変遷</div>`;

    if (records.length === 1) {
      // 1件のみの場合はそのまま表示
      const r = records[0];
      const date = new Date(r.fetchedAt).toLocaleDateString('ja-JP');
      html += `<div class="report-brand-block">
        <div style="font-size:11px;color:var(--text3);margin-bottom:8px;">取得日: ${date}</div>`;
      html += renderRecordForReport(r);
      html += `</div>`;
    } else {
      // 複数件：変遷表示
      // LP変遷
      html += `<div style="margin-bottom:12px"><div style="font-size:11px;color:var(--accent);font-weight:600;letter-spacing:0.06em;text-transform:uppercase;margin-bottom:8px;">新作訴求 / LP の変遷</div>`;
      html += `<div style="display:grid;grid-template-columns:repeat(${Math.min(records.length,3)},1fr);gap:10px;">`;
      records.forEach(r => {
        const date = new Date(r.fetchedAt).toLocaleDateString('ja-JP');
        html += `<div style="background:var(--bg3);border-radius:var(--radius);padding:12px;border:1px solid var(--border);">
          <div style="font-size:11px;color:var(--accent);font-weight:600;margin-bottom:8px;">📅 ${date}</div>`;
        if ((r.lp||[]).length > 0) {
          r.lp.forEach(i => {
            html += `<div style="margin-bottom:6px;">
              <div style="font-size:10px;color:var(--accent);font-weight:600;">${h(i.tag||'')}</div>
              <div style="font-size:12px;color:var(--text);font-weight:500;">${h(i.title||'')}</div>
              <div style="font-size:11px;color:var(--text2);">${h(i.desc||'')}</div>
            </div>`;
          });
          const imgs = r.lp.filter(i=>i.imageUrl);
          if (imgs.length) html += `<div style="display:flex;gap:4px;margin-top:6px;">` + imgs.map(i=>`<img style="width:60px;height:45px;object-fit:cover;border-radius:4px;" src="${h(i.imageUrl)}" onerror="this.style.display='none'">`).join('') + `</div>`;
        } else {
          html += `<div style="font-size:12px;color:var(--text3);">データなし</div>`;
        }
        html += `</div>`;
      });
      html += `</div></div>`;

      // EC売れ筋変遷
      html += `<div><div style="font-size:11px;color:var(--accent);font-weight:600;letter-spacing:0.06em;text-transform:uppercase;margin-bottom:8px;">EC売れ筋 の変遷</div>`;
      html += `<div style="display:grid;grid-template-columns:repeat(${Math.min(records.length,3)},1fr);gap:10px;">`;
      records.forEach(r => {
        const date = new Date(r.fetchedAt).toLocaleDateString('ja-JP');
        html += `<div style="background:var(--bg3);border-radius:var(--radius);padding:12px;border:1px solid var(--border);">
          <div style="font-size:11px;color:var(--accent);font-weight:600;margin-bottom:8px;">📅 ${date}</div>`;
        const ec = filterEC(r.ec||[]).slice(0,3);
        if (ec.length > 0) {
          ec.forEach((i,idx) => {
            html += `<div style="display:flex;gap:6px;margin-bottom:6px;align-items:center;">
              <div style="font-family:'Syne',sans-serif;font-size:14px;font-weight:700;color:${idx<3?'var(--accent)':'var(--border2)'};min-width:18px;">${idx+1}</div>
              ${i.imageUrl ? `<img style="width:36px;height:36px;object-fit:cover;border-radius:4px;" src="${h(i.imageUrl)}" onerror="this.style.display='none'">` : ''}
              <div>
                <div style="font-size:11px;color:var(--text3);">${h(i.category||'')}</div>
                <div style="font-size:12px;color:var(--text);font-weight:500;">${h(i.name||'')}</div>
                <div style="font-size:11px;color:var(--accent);">${h(i.price||'')}</div>
              </div>
            </div>`;
          });
        } else {
          html += `<div style="font-size:12px;color:var(--text3);">データなし</div>`;
        }
        html += `</div>`;
      });
      html += `</div></div>`;
    }

    html += `</div>`;
  });

  document.getElementById('reportContent').innerHTML = html;
}

function renderRecordForReport(r) {
  let html = '';
  if ((r.lp||[]).length > 0) {
    html += `<div style="margin-bottom:10px;"><div style="font-size:10px;color:var(--text3);margin-bottom:4px;">新作訴求 / LP</div>`;
    r.lp.forEach(i => {
      html += `<div class="report-row"><span class="report-label">${h(i.tag||'')}</span><span class="report-value">${h(i.title||'')}${i.desc?' — '+h(i.desc):''}</span></div>`;
    });
    html += `</div>`;
  }
  const ec = filterEC(r.ec||[]).slice(0,3);
  if (ec.length > 0) {
    html += `<div><div style="font-size:10px;color:var(--text3);margin-bottom:4px;">EC売れ筋 TOP3</div>`;
    ec.forEach((i,idx) => {
      html += `<div class="report-row"><span class="report-label">${idx+1}位 ${h(i.category||'')}</span><span class="report-value">${h(i.name||'')}${i.price?' / '+h(i.price):''}</span></div>`;
    });
    html += `</div>`;
  }
  return html;
}

function printReport() {
  // 既存の印刷エリアを削除
  const existing = document.getElementById('printArea');
  if (existing) existing.remove();

  const byBrand = getAllRecordsForReport();
  const now = new Date();
  const from = document.getElementById('dateFrom').value;
  const to   = document.getElementById('dateTo').value;
  const seasonLabel = currentSeason === 'ALL' ? '全期間' : currentSeason;
  const periodLabel = from || to ? `${from||''}〜${to||''}` : seasonLabel;
  const aiComment = document.querySelector('#reportContent .print-ai-text')?.textContent || 
                    document.querySelector('#reportContent div[style*="border-left"]')?.textContent || '';

  let html = `<div id="printArea">
    <div class="print-cover">
      <div class="print-cover-title">競合分析レポート</div>
      <div class="print-cover-sub">期間：${periodLabel}</div>
      <div class="print-cover-sub">作成日：${now.toLocaleDateString('ja-JP')}</div>
      <div class="print-cover-accent">ONLY EC・販促チーム</div>
    </div>`;

  // AI総括
  if (aiComment) {
    html += `<div class="print-ai-section">
      <div class="print-ai-label">🤖 AI 総括コメント</div>
      <div class="print-ai-text">${aiComment.replace(/</g,'&lt;').replace(/>/g,'&gt;')}</div>
    </div>`;
  }

  // ブランドごとの変遷
  byBrand.forEach(({ brand, records }, brandIdx) => {
    html += `<div class="print-brand-section">
      <div class="print-brand-header">
        <div class="print-brand-name">${brand.name}</div>
        <div class="print-brand-date">${records.length}回分のデータ</div>
      </div>`;

    const colClass = records.length === 1 ? 'print-timeline-1' : records.length === 2 ? 'print-timeline-2' : 'print-timeline-3';

    // LP変遷
    html += `<div class="print-col-label" style="margin-bottom:10px;">新作訴求 / LP</div>`;
    html += `<div class="print-timeline ${colClass}" style="margin-bottom:20px;">`;
    records.forEach(r => {
      const date = new Date(r.fetchedAt).toLocaleDateString('ja-JP');
      html += `<div class="print-date-card">
        <div class="print-date-card-header">📅 ${date}</div>
        <div class="print-date-card-body">`;
      if ((r.lp||[]).length > 0) {
        r.lp.forEach(i => {
          html += `<div class="print-lp-item">
            <div class="print-lp-tag">${i.tag||''}</div>
            <div class="print-lp-title">${i.title||''}</div>
            <div class="print-lp-desc">${i.desc||''}</div>
          </div>`;
        });
      } else {
        html += `<div style="font-size:11px;color:#aaa;">データなし</div>`;
      }
      html += `</div></div>`;
    });
    html += `</div>`;

    // EC売れ筋変遷
    html += `<div class="print-col-label" style="margin-bottom:10px;">EC 売れ筋</div>`;
    html += `<div class="print-timeline ${colClass}">`;
    records.forEach(r => {
      const date = new Date(r.fetchedAt).toLocaleDateString('ja-JP');
      const ec = filterEC(r.ec||[]).slice(0,5);
      html += `<div class="print-date-card">
        <div class="print-date-card-header">📅 ${date}</div>
        <div class="print-date-card-body">`;
      if (ec.length > 0) {
        html += `<table class="print-ec-table">
          <thead><tr><th>#</th><th>カテゴリ</th><th>商品名</th><th>価格</th></tr></thead><tbody>`;
        ec.forEach((i,idx) => {
          html += `<tr>
            <td><span class="print-ec-rank">${idx+1}</span></td>
            <td><span class="print-ec-cat">${i.category||''}</span></td>
            <td><span class="print-ec-name">${i.name||''}</span></td>
            <td><span class="print-ec-price">${i.price||''}</span></td>
          </tr>`;
        });
        html += `</tbody></table>`;
      } else {
        html += `<div style="font-size:11px;color:#aaa;">データなし</div>`;
      }
      html += `</div></div>`;
    });
    html += `</div></div>`;
  });

  html += `</div>`;

  document.body.insertAdjacentHTML('beforeend', html);
  // モーダルを一時非表示
  const modal = document.getElementById('reportModal');
  modal.classList.remove('open');
  modal.style.display = 'none';
  setTimeout(() => {
    window.print();
    setTimeout(() => {
      modal.classList.add('open');
      modal.style.display = '';
      const el = document.getElementById('printArea');
      if (el) el.remove();
    }, 1000);
  }, 200);
}

// ======================================================
// 設定
// ======================================================
document.getElementById('settingsBtn').addEventListener('click', () => {
  const s = JSON.parse(localStorage.getItem(SETTINGS_KEY)||'{}');
  if (s.workerUrl) document.getElementById('workerUrlInput').value = s.workerUrl;
  document.getElementById('settingsPanel').classList.add('open');
});
function saveSettings() {
  const workerUrl = document.getElementById('workerUrlInput').value.trim();
  localStorage.setItem(SETTINGS_KEY, JSON.stringify({ workerUrl }));
  showToast('設定を保存しました');
  closeModal('settingsPanel');
}
function getWorkerUrl() {
  try { return JSON.parse(localStorage.getItem(SETTINGS_KEY)||'{}').workerUrl || ''; } catch(e) { return ''; }
}

// ======================================================
// ユーティリティ
// ======================================================
function closeModal(id, e) {
  if (e && e.target !== document.getElementById(id)) return;
  document.getElementById(id).classList.remove('open');
}
function h(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2600);
}
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') { closeModal('reportModal'); closeModal('settingsPanel'); }
});

// ======================================================
// 起動
// ======================================================
async function init() {
  try {
    db = await openDB();
    allRecords = await loadAllRecords();
  } catch(e) {
    console.error('IndexedDB error:', e);
    allRecords = [];
  }
  renderBrandGrid();
  renderSeasonTabs();
  renderCatTabs();
  renderBrandsContainer();
  updateToolsBar();
}

init();
</script>
</body>
</html>
